<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ズートピア キャラクター クイズ</title>
    <!-- スマホのホーム画面用アイコン設定 -->
    <link rel="apple-touch-icon" href="pics/ホップス.exif">
    <link rel="icon" type="image/x-icon" href="pics/ホップス.exif">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ズートピアクイズ">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=M+PLUS+Rounded+1c:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <header>
            <h1 id="title">ズートピア クイズ</h1>
            <div class="score-container hidden" id="score-board">
                <div>せいかい: <span id="score">0</span></div>
                <div>まちがい: <span id="wrong-score">0</span></div>
            </div>
        </header>

        <div id="start-screen">
            <div id="start-character-container">
                <img src="pics/ホップス.exif" alt="ジュディ" class="start-char">
                <img src="pics/ワイルド.exif" alt="ニック" class="start-char">
            </div>
            <p class="start-message">ズートピア クイズを<br>はじめるよ！</p>
            <button id="start-game-btn" onclick="startGame()">スタート！</button>
        </div>

        <main id="quiz-screen" class="hidden">
            <div id="question-container">
                <div id="image-container" class="hidden">
                    <img id="question-image" src="" alt="キャラクター">
                </div>
                <p id="question-text">もんだいが出るよ！</p>
            </div>

            <div id="choices-container">
                <button class="choice-btn" id="choice1" onclick="checkAnswer(0)">せんたくし1</button>
                <button class="choice-btn" id="choice2" onclick="checkAnswer(1)">せんたくし2</button>
                <button class="choice-btn" id="choice3" onclick="checkAnswer(2)">せんたくし3</button>
                <button class="choice-btn" id="choice4" onclick="checkAnswer(3)">せんたくし4</button>
            </div>
        </main>

        <div id="result-screen" class="hidden">
            <div id="hanamaru-container" class="hidden">💮</div>
            <div id="fireworks-container"></div>
            <h2 id="result-message">おわり！</h2>
            <p id="final-score">10てん ちゅう 0てん だったよ！</p>
            <div id="history-container">
                <h3>これまでの きろく</h3>
                <ul id="history-list"></ul>
            </div>
            <button id="restart-btn" onclick="startGame()">もういちど あそぶ</button>
        </div>

        <div id="feedback-overlay" class="hidden">
            <div id="feedback-icon"></div>
        </div>
    </div>

    <audio id="se-correct" src="sounds/correct.mp3" preload="auto"></audio>
    <audio id="se-wrong" src="sounds/wrong.mp3" preload="auto"></audio>
    <audio id="se-perfect" src="sounds/全問正解.mp3" preload="auto"></audio>
    <audio id="se-start" src="sounds/クイズ出題.mp3" preload="auto"></audio>
    <audio id="se-timer" src="sounds/制限時間タイマー.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>

</html>
